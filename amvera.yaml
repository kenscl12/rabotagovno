# Пример конфигурации для развёртывания ASP.NET Core приложения на Amvera.
# При необходимости подправь под актуальный формат у провайдера.

version: 1

services:
  web:
    # Имя сервиса/приложения
    name: rabotagovno-clone

    # Рабочая директория (корень репозитория)
    root: .

    # Команда сборки
    build:
      cmd: dotnet publish -c Release -o out

    # Команда запуска опубликованного приложения
    run:
      cmd: dotnet out/RabotaGovnoClone.dll

    # Переменные окружения для контейнера/процесса
    env:
      ASPNETCORE_ENVIRONMENT: Production
      # Amvera обычно пробрасывает переменную PORT, поэтому привязываем Kestrel к этому порту
      ASPNETCORE_URLS: "http://0.0.0.0:${PORT:-8080}"

    # Какой порт пробрасывать наружу (если требуется явно)
    ports:
      - 8080

    # Файлы/каталоги, которые можно кэшировать между билдами
    cache:
      - ~/.nuget/packages

